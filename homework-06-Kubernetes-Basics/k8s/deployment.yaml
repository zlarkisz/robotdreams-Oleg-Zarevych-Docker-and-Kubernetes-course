# =============================================================================
# Deployment: course-app
# =============================================================================
# Що таке Deployment:
#   Високорівневий контролер K8s, який керує ЖИТТЄВИМ ЦИКЛОМ застосунку.
#   Ти описуєш БАЖАНИЙ стан ("хочу 5 копій course-app:1.0.1"), а K8s сам
#   розбирається як цього досягти і як підтримувати.
#
# Що Deployment робить під капотом:
#   1. Створює ReplicaSet (контролер нижчого рівня)
#   2. ReplicaSet створює і підтримує N подів за template
#   3. При зміні spec (image, env) Deployment створює НОВИЙ ReplicaSet
#      і поступово переводить поди старого → нового (rolling update)
#   4. Старі ReplicaSet'и зберігаються (за замовчуванням 10) для rollback'у
#
# Ієрархія: Deployment → ReplicaSet → Pod → Container
# =============================================================================

# -----------------------------------------------------------------------------
# apiVersion: apps/v1
# -----------------------------------------------------------------------------
# Версія Kubernetes API, яка визначає Deployment.
# 'apps' — API group, де живуть workload-контролери (Deployment, ReplicaSet,
# StatefulSet, DaemonSet). 'v1' — стабільна версія цієї групи.
#
# Для Deployment це КОНСТАНТА — практично ніколи не змінюється.
# (Pod'и натомість живуть у "core" групі — там apiVersion: v1 без префіксу.)
apiVersion: apps/v1

# -----------------------------------------------------------------------------
# kind: Deployment
# -----------------------------------------------------------------------------
# Тип ресурсу. Інші можливі kind у K8s: Pod, Service, ConfigMap, Secret,
# StatefulSet, DaemonSet, Job, CronJob, Ingress, тощо.
kind: Deployment

# =============================================================================
# metadata — інформація ПРО САМ об'єкт Deployment
# =============================================================================
# metadata описує "паспорт" об'єкта: ім'я, лейбли, namespace, annotations.
# Це універсальна структура — однакова для ВСІХ типів об'єктів у K8s.
# =============================================================================
metadata:
  # Ім'я Deployment — унікальне в межах namespace
  # Може бути таким же як ім'я Service (різні типи не конфліктують)
  # Правила: малі латинські літери, цифри, дефіс. Без _, пробілів, апострофів
  name: course-app

  # Лейбли (labels) на сам Deployment
  # ⚠️ Це лейбли об'єкта Deployment, НЕ подів!
  # Лейбли подів задаються нижче, у template.metadata.labels
  #
  # Навіщо лейбли тут:
  # - Фільтрація через kubectl: `kubectl get deployments -l app=course-app`
  # - Інструменти (Lens, k9s, dashboards) групують об'єкти за лейблами
  # - Можна виявити "сирітські" Deployment'и через відсутність очікуваних лейблів
  labels:
    app: course-app # назва застосунку
    component: backend # роль у системі (backend / frontend / cache / db)

# =============================================================================
# spec — БАЖАНИЙ стан Deployment
# =============================================================================
# spec (specification) описує ЧОГО ти хочеш досягти.
# K8s самостійно з'ясовує ЯК цього досягти.
# =============================================================================
spec:
  # ---------------------------------------------------------------------------
  # replicas — скільки подів має бути одночасно запущено
  # ---------------------------------------------------------------------------
  # Якщо под падає (OOMKilled, нода померла) — ReplicaSet помічає що подів
  # менше за бажану кількість і створює новий.
  #
  # У завданні було 2 на старті, потім бампнуто до 5 для демонстрації scale up.
  # Локально 5 подів × ~30Mi RAM = ~150Mi — мізерно для Mac.
  replicas: 5

  # ---------------------------------------------------------------------------
  # selector — як Deployment ЗНАХОДИТЬ "свої" поди
  # ---------------------------------------------------------------------------
  # ReplicaSet створює поди за template (нижче) і шукає їх через цей selector.
  # Технічно ReplicaSet каже: "мої поди — ті, що мають ці лейбли".
  #
  # ⚠️ КРИТИЧНО ВАЖЛИВО: ці лейбли мусять збігатися з template.metadata.labels.
  # Інакше створені поди не матимуть очікуваних лейблів → ReplicaSet їх не
  # "побачить" → буде створювати ще і ще, нескінченно.
  # На практиці apply просто фейлиться валідацією (K8s ловить цю проблему).
  #
  # ⚠️ selector — IMMUTABLE: після першого apply змінити не можна.
  # Якщо треба змінити — видалити Deployment і створити новий.
  # Тому селектори зазвичай прості (`app: <name>`) — менше шансів захотіти змінити.
  #
  # Альтернативи matchLabels (не використовуємо тут):
  #   matchExpressions:
  #     - key: app
  #       operator: In
  #       values: [course-app, course-app-canary]
  selector:
    matchLabels:
      app: course-app
      component: backend

  # ---------------------------------------------------------------------------
  # strategy — ЯК Deployment оновлює поди при зміні spec
  # ---------------------------------------------------------------------------
  # Запускається коли ти міняєш image, env, resources, або будь-що в template.
  # Зміна replicas НЕ запускає strategy — це просто додавання/видалення подів.
  #
  # Два типи:
  # 1. RollingUpdate (наш випадок) — поступове оновлення без даунтайму
  # 2. Recreate — спочатку вбити ВСІ старі, потім підняти нові (з даунтаймом)
  #
  # Recreate потрібен коли застосунок не може мати дві версії одночасно
  # (наприклад, мігрує DB схему і нова версія несумісна зі старою).
  strategy:
    type: RollingUpdate

    rollingUpdate:
      # maxSurge — на скільки подів МОЖНА перевищити replicas під час оновлення
      # Можна абсолютне число (1) або відсоток (25%)
      # У нас replicas=5, maxSurge=1 → під час оновлення може бути до 6 подів
      maxSurge: 1

      # maxUnavailable — скільки існуючих подів МОЖУТЬ бути недоступні одночасно
      # 0 → жоден не вмирає поки новий не Ready = ZERO-DOWNTIME
      # Дефолт: 25% (для replicas=5 це ~1 под)
      maxUnavailable: 0
      #
      # Як виглядає rolling update з нашими параметрами (5 replicas):
      # 1. Старт: 5 старих подів живі
      # 2. K8s створює 1 новий → 5 старих + 1 новий = 6 подів
      # 3. Новий став Ready → K8s гасить 1 старий → 4 старих + 1 новий = 5
      # 4. Створює ще 1 новий → 4 старих + 2 нових = 6
      # 5. ... і так далі поки 0 старих + 5 нових
      # Повний цикл — без жодного моменту коли подів менше 5

  # ---------------------------------------------------------------------------
  # template — ШАБЛОН пода
  # ---------------------------------------------------------------------------
  # Це ПРАКТИЧНО Pod spec, тільки без верхнього apiVersion+kind.
  # ReplicaSet використовує template як "штамп" для створення подів.
  #
  # Структура template повторює структуру Pod:
  #   template:
  #     metadata:    # metadata пода
  #     spec:        # spec пода (containers, volumes, etc.)
  template:
    # -------------------------------------------------------------------------
    # template.metadata — metadata САМОГО ПОДА (не Deployment'у!)
    # -------------------------------------------------------------------------
    # Зверни увагу: name тут НЕ задається — K8s генерує автоматично у форматі
    # <deployment-name>-<replicaset-hash>-<pod-hash>
    # Наприклад: course-app-55b84d7658-bmj65
    metadata:
      labels:
        # ⚠️ Ці лейбли МУСЯТЬ включати все що в spec.selector.matchLabels вище
        app: course-app # обов'язково — selector шукає за цим
        component: backend # обов'язково — selector шукає за цим

        # Косметичні лейбли — для відстеження, не використовуються в selector
        version: "1.0.1"
        # Лапки навколо "1.0.1" обов'язкові, інакше YAML розпарсить як число 1.0
        # і викине останній .0 — отримаєш version: 1.0

    # -------------------------------------------------------------------------
    # template.spec — spec САМОГО ПОДА
    # -------------------------------------------------------------------------
    spec:
      # containers — список контейнерів у поді
      # У 99% випадків — один. Кілька буває для sidecar-патерну (logger, proxy)
      # Контейнери в одному поді ділять мережу (localhost) і можуть ділити volumes
      containers:
        # =====================================================================
        # Контейнер 1: course-app
        # =====================================================================
        - name: course-app
          # Ім'я контейнера в межах пода. Використовується у:
          #   kubectl logs <pod> -c <container-name>
          #   kubectl exec <pod> -c <container-name> -- sh
          # Якщо в поді один контейнер — -c можна пропускати

          # -------------------------------------------------------------------
          # image — який образ запускати
          # -------------------------------------------------------------------
          # Формат: [registry/]<user>/<image>[:<tag>|@<digest>]
          # Без registry → дефолт docker.io (Docker Hub)
          # Без тегу → дефолт :latest (НЕ використовувати в продах!)
          #
          # Multi-arch образ (amd64 + arm64) — kubelet сам обере свою платформу
          # через manifest list у Docker Hub.
          image: zlarkisz/course-app:1.0.1

          # -------------------------------------------------------------------
          # imagePullPolicy — коли pulling робити
          # -------------------------------------------------------------------
          # Always       — завжди docker pull перед стартом контейнера
          # IfNotPresent — pull тільки якщо локально немає (наш випадок)
          # Never        — ніколи, тільки локальний кеш
          #
          # K8s дивне дефолтне правило:
          # - тег :latest         → дефолт Always
          # - будь-який інший тег → дефолт IfNotPresent
          # Логіка: припускається що :latest змінюється, а версіонований — ні
          imagePullPolicy: IfNotPresent

          # -------------------------------------------------------------------
          # ports — які порти відкриває контейнер
          # -------------------------------------------------------------------
          # ⚠️ ВАЖЛИВО: containerPort НІЧОГО НЕ "ВІДКРИВАЄ"!
          # Це лише ДОКУМЕНТАЦІЯ для людей та інших K8s об'єктів.
          # Контейнер слухає на 8080 незалежно від того, є це поле чи ні —
          # порт визначає сам застосунок (uvicorn з --port 8080).
          #
          # Навіщо взагалі вказувати:
          # 1. Документація (читач бачить які порти у застосунку)
          # 2. Іменовані порти — Service може посилатись через `targetPort: http`
          #    замість числа `targetPort: 8080`
          # 3. Метрики/інструменти (Prometheus auto-discovery, service mesh)
          # 4. Network Policies — обмеження трафіку за іменованим портом
          ports:
            - name: http # ім'я порту, на нього посилається Service
              containerPort: 8080 # порт всередині контейнера
              protocol: TCP # TCP за замовчуванням; альтернатива UDP/SCTP

          # -------------------------------------------------------------------
          # resources — обмеження CPU/RAM
          # -------------------------------------------------------------------
          # Це КРИТИЧНО важливе поле для прода. Без нього под у класі BestEffort —
          # буде вбитий ПЕРШИМ коли нода у стресі (memory pressure, eviction).
          #
          # requests vs limits — РІЗНІ речі, плутати небезпечно:
          #
          # requests = мінімум, ГАРАНТОВАНО зарезервований scheduler'ом.
          # Scheduler планує: "ця нода має 4Gi RAM, зайнято 3Gi, ще 1Gi вільно.
          # Под просить 32Mi → влізе, кладу сюди". Якщо подів забагато — нові
          # просто не плануються (статус Pending).
          #
          # limits = максимум, HARD CAP. Якщо контейнер хоче більше:
          # - CPU: throttling (контейнер сповільнюється, не вмирає)
          # - Memory: OOMKilled (kernel вбиває контейнер, K8s рестартує)
          #
          # Одиниці виміру:
          # CPU:    1 = 1 ядро. 500m = 0.5 ядра ("m" = millicores).
          # Memory: Mi = mebibytes (1024 KB), Gi = gibibytes.
          #         M (без 'i') = megabytes (1000 KB) — стандарт K8s — Mi/Gi.
          resources:
            requests:
              memory: "32Mi" # гарантовано виділено: 32 mebibytes
              cpu: "50m" # гарантовано: 0.05 ядра (5%)
            limits:
              memory: "128Mi" # hard cap: 128Mi → понад → OOMKilled
              cpu: "250m" # hard cap: 0.25 ядра → понад → throttling

          # -------------------------------------------------------------------
          # env — змінні середовища контейнера
          # -------------------------------------------------------------------
          # Ці змінні передаються застосунку як os.environ
          # Наш FastAPI читає їх через os.getenv() у main.py
          #
          # ⚠️ env — це СПИСОК (з тире), не словник.
          # Чому? Бо є три способи задати значення:
          #   1. value: "..."                       — статичне значення (наш випадок)
          #   2. valueFrom.secretKeyRef             — з Secret (для паролів)
          #   3. valueFrom.configMapKeyRef          — з ConfigMap (для конфігів)
          # Словник такого не вмістить.
          env:
            # APP_STORE — який store backend використовувати в course-app
            # Можливі значення: sqlite (дефолт), redis, http
            # У домашці використовуємо sqlite, бо не потрібен зовнішній stateful
            - name: APP_STORE
              value: "sqlite"

            # APP_MESSAGE — кастомний привіт на головній сторінці застосунку
            # Видно прямо в браузері — наочне підтвердження що env передається
            - name: APP_MESSAGE
              value: "Course App in Kubernetes"
