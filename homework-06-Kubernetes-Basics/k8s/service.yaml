# =============================================================================
# Service: course-app (NodePort)
# =============================================================================
# Що таке Service:
#   Абстракція K8s, яка вирішує ТРИ проблеми мережі:
#
#   1. Поди ефемерні. Под помер → створився новий → IP змінилася.
#      Service дає СТАБІЛЬНУ ClusterIP, яка НЕ змінюється.
#
#   2. Поди живуть у внутрішній мережі K8s.
#      З хост-машини (твого Mac) у цю мережу не докричишся напряму.
#      Service деяких типів (NodePort, LoadBalancer) пробивають мережу назовні.
#
#   3. Кілька подів — кому слати запит?
#      Service балансує трафік між подами через kube-proxy (iptables/IPVS).
#
# Як Service знаходить поди:
#   Через `selector` — шукає поди з певними лейблами.
#   Це РОЗВ'ЯЗУЄ Service і Deployment: вони знають один про одного тільки
#   через лейбли, не через прямі посилання.
#
# Аналогія:
#   Service = офіс компанії з постійною адресою і телефоном
#   Поди = працівники що приходять/уходять
#   Замовник дзвонить на головний номер → секретар (kube-proxy) перенаправляє
#   виклик на вільного працівника (под)
# =============================================================================

# -----------------------------------------------------------------------------
# apiVersion: v1
# -----------------------------------------------------------------------------
# Service живе в "core" API group (без префіксу) разом з Pod, ConfigMap,
# Secret, Namespace, Node — найфундаментальнішими об'єктами K8s.
#
# Apps API group (apps/v1) — для пізніших workload-контролерів
# (Deployment, ReplicaSet, StatefulSet, DaemonSet).
apiVersion: v1

# -----------------------------------------------------------------------------
# kind: Service
# -----------------------------------------------------------------------------
kind: Service

# =============================================================================
# metadata — паспорт Service
# =============================================================================
metadata:
  # Ім'я Service — унікальне в межах namespace ДЛЯ ТИПУ Service
  # Може збігатись з ім'ям Deployment (різні типи не конфліктують)
  #
  # ⚠️ Це ім'я також використовується як DNS-ім'я в кластері!
  # Інші поди можуть звертатись до цього Service через:
  #   http://course-app                     (з того ж namespace)
  #   http://course-app.default             (з іншого namespace)
  #   http://course-app.default.svc.cluster.local  (FQDN)
  name: course-app

  # Лейбли на сам Service (не для пошуку подів — це окрема секція spec.selector)
  # Корисно для:
  # - kubectl get all -l app=course-app  → побачити Service разом з Deployment
  # - Інструменти для огляду кластера групують об'єкти за лейблами
  labels:
    app: course-app
    component: backend

# =============================================================================
# spec — як Service працює
# =============================================================================
spec:
  # ---------------------------------------------------------------------------
  # type — як Service виставляє поди назовні
  # ---------------------------------------------------------------------------
  # Чотири типи:
  #
  # 1. ClusterIP (default)
  #    Стабільна внутрішня IP, доступна ТІЛЬКИ всередині кластера.
  #    Інші поди → так, твій браузер → ні.
  #    Для: внутрішньої комунікації між сервісами (мікросервіси).
  #
  # 2. NodePort (НАШ ВИБІР)
  #    Все що ClusterIP + відкриває порт у діапазоні 30000-32767 на КОЖНІЙ
  #    ноді кластера. Зовнішній клієнт стукає на <node-ip>:<nodePort>,
  #    далі трафік іде через Service до подів.
  #    Для: локального дев, простого доступу без LoadBalancer'а.
  #
  # 3. LoadBalancer
  #    Все що NodePort + автоматично створює хмарний LB (AWS ELB, GCP LB,
  #    Azure LB) і направляє трафік на NodePort'и. Це ОСНОВНИЙ спосіб
  #    виставити прод назовні в хмарних кластерах.
  #    Для: прод у хмарі.
  #
  # 4. ExternalName
  #    Просто DNS-аліас для зовнішньої адреси (CNAME). Не балансує, не
  #    проксує — лише перенаправляє DNS-резолвінг.
  #    Для: проксі до зовнішніх API через свій DNS у кластері.
  type: NodePort

  # ---------------------------------------------------------------------------
  # selector — які поди обслуговувати
  # ---------------------------------------------------------------------------
  # Service шле трафік на ВСІ поди з ЦИМИ лейблами (AND між парами).
  # Це не залежить від того, через який Deployment чи ReplicaSet поди створені.
  #
  # ⚠️ Не плутати з selector у Deployment — там матриця:
  #   Deployment ↔ ReplicaSet ↔ Pod (через template + selector)
  # Тут selector прямий: Service ↔ Pod, без посередника.
  #
  # ⚠️ На відміну від Deployment.spec.selector — у Service просто map<key,value>,
  # без обгортки `matchLabels`. Це історична причина: Service з'явився раніше
  # ніж matchLabels/matchExpressions.
  selector:
    app: course-app
    component: backend

  # ---------------------------------------------------------------------------
  # ports — як саме трафік потрапляє до подів
  # ---------------------------------------------------------------------------
  # Один з найзаплутаніших моментів K8s — у Service ТРИ різні порти:
  #
  #   ┌───────────────────────────────────────────────────────────────┐
  #   │  Браузер (хост-машина)                                        │
  #   │       │                                                       │
  #   │       │ http://localhost:30080                                │
  #   │       ↓                                                       │
  #   │  ┌────────────────────────┐                                   │
  #   │  │  Нода: docker-desktop  │                                   │
  #   │  │  port :30080  ← nodePort                                   │
  #   │  └────────┬───────────────┘                                   │
  #   │           │                                                   │
  #   │           ↓ (kube-proxy: iptables)                            │
  #   │  ┌────────────────────────┐                                   │
  #   │  │  Service: course-app   │                                   │
  #   │  │  ClusterIP :80  ← port                                     │
  #   │  └────────┬───────────────┘                                   │
  #   │           │                                                   │
  #   │           ↓ round-robin між подами                            │
  #   │  ┌────────────────────────┐                                   │
  #   │  │  Pod: course-app-...   │                                   │
  #   │  │  Container :8080  ← targetPort                             │
  #   │  └────────────────────────┘                                   │
  #   └───────────────────────────────────────────────────────────────┘
  #
  # Підсумок ролей:
  #
  # ┌───────────────┬──────────────────┬────────────────────┬──────────────┐
  # │ Порт          │ Де живе          │ Хто звертається    │ Хто слухає   │
  # ├───────────────┼──────────────────┼────────────────────┼──────────────┤
  # │ port: 80      │ Service ClusterIP│ інші поди в к-ері  │ Service      │
  # │ targetPort    │ Под              │ Service внутрішньо │ контейнер    │
  # │ nodePort 30080│ Нода             │ зовнішні клієнти   │ kube-proxy   │
  # └───────────────┴──────────────────┴────────────────────┴──────────────┘
  ports:
    - name: http
      # Ім'я цього port-блоку. Корисно коли Service виставляє кілька портів
      # одночасно (HTTP + HTTPS + metrics), щоб їх розрізняти.

      # -----------------------------------------------------------------------
      # port — на якому порту слухає САМ Service (через ClusterIP)
      # -----------------------------------------------------------------------
      # Інші поди в кластері звертаються до Service через DNS-ім'я + port:
      #   curl http://course-app:80        ← звідси port: 80
      #   curl http://course-app           ← :80 опускається бо HTTP-дефолт
      #
      # 80 — стандартний HTTP, найкраще читається.
      # Можна обрати 8080 щоб збігалося з containerPort, але:
      # - інші поди мали б писати http://course-app:8080
      # - 80 — конвенція для HTTP-сервісів
      port: 80

      # -----------------------------------------------------------------------
      # targetPort — куди Service шле трафік У ПОДУ
      # -----------------------------------------------------------------------
      # ВАЖЛИВО: тут ми використовуємо ІМ'Я порту, а не число.
      # 'http' — це name з deployment.yaml.template.spec.containers[0].ports[0].name
      #
      # Можна було б написати targetPort: 8080 (число), і це б теж працювало.
      # Іменована форма — гнучкіша:
      # - Якщо колись зміниться порт застосунку (8080 → 3000), правиш у
      #   ОДНОМУ місці — containerPort у Deployment. Service підхопить через ім'я.
      # - Якщо число — править треба у ДВОХ місцях.
      targetPort: http

      # -----------------------------------------------------------------------
      # nodePort — порт на ноді (для зовнішнього доступу)
      # -----------------------------------------------------------------------
      # Тільки для type: NodePort або LoadBalancer.
      #
      # Допустимий діапазон: 30000-32767 (за замовчуванням K8s)
      # Якщо діапазон інший — налаштовується в kube-apiserver через
      # --service-node-port-range
      #
      # Якщо НЕ вказати — K8s сам присвоїть випадковий з пулу. Це безпечно
      # для тестових середовищ, але незручно для документації (порт буде
      # різний при кожному apply на новому кластері).
      #
      # Браузер: http://localhost:30080
      # На реальному кластері з кількома нодами: http://<any-node-ip>:30080
      # — трафік потрапить на ту ноду, потім kube-proxy перенаправить на
      # будь-який живий под (можливо на ІНШІЙ ноді — це нормально).
      nodePort: 30080

      # -----------------------------------------------------------------------
      # protocol — TCP / UDP / SCTP
      # -----------------------------------------------------------------------
      # TCP  — дефолт, для HTTP / REST / gRPC / WebSocket
      # UDP  — для DNS, відеостріми, ігри (Quake server)
      # SCTP — рідко, для телекому
      #
      # Можна не писати (TCP за замовчуванням), але явно — наочніше.
      protocol: TCP
